name: "GitOps: Auto-Deploy on Push"

# ======================================================
# TRUE GITOPS: Push to main → auto-deploy to production
# Edit data/services.json → push → live in 2 minutes
# ======================================================

on:
  push:
    branches: [main]

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.paths.outputs.src }}
      infra: ${{ steps.paths.outputs.infra }}
      tagmentip: ${{ steps.paths.outputs.tagmentip }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed files
        id: paths
        uses: dorny/paths-filter@v4
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'tailwind.config.ts'
              - 'tsconfig.json'
              - 'postcss.config.mjs'
              - 'public/**'
            infra:
              - 'InfraBuild-Partners/**'
              - 'deployments/**'
              - 'scripts/**'
              - 'docker-compose.yml'
              - 'docker/**'
              - '.github/workflows/**'
            tagmentip:
              - 'Tagmentip-LLC/**'

  deploy-lightsail:
    name: "Deploy to AWS Lightsail"
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: bash ~/scripts/deploy.sh

  deploy-vercel:
    name: "Deploy Portfolio to Vercel"
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel
        run: cd src && npx vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-tagmentip:
    name: "Deploy Tagmentip LLC to Vercel"
    needs: paths-filter
    if: ${{ needs.paths-filter.outputs.tagmentip == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Tagmentip to Vercel
        run: cd Tagmentip-LLC && npx vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}


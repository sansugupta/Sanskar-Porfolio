replicaCount: 1

image:
  repository: infrabuild-partners
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: infrabuildpartners.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: infrabuild-tls
      hosts:
        - infrabuildpartners.com

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
